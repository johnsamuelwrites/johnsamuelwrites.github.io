                <h2 class="hero-title">PLANTAS</h2>

                <!-- Botanical SVG -->
                <!-- Enhanced Botanical SVG (realistic style) -->
                <svg class="botanical-svg" viewbox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg">
                    <!-- Definitions -->
                    <defs>
                        <!-- Stems gradient -->
                        <lineargradient id="stemGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#7CB342" />
                            <stop offset="100%" stop-color="#33691E" />
                        </lineargradient>

                        <!-- Leaves gradient -->
                        <lineargradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#A5D6A7" stop-opacity="0.9" />
                            <stop offset="100%" stop-color="#66BB6A" stop-opacity="0.7" />
                        </lineargradient>

                        <!-- Leaf vein gradient -->
                        <lineargradient id="veinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#558B2F" stop-opacity="0.8" />
                            <stop offset="100%" stop-color="#33691E" stop-opacity="0.3" />
                        </lineargradient>

                        <!-- Soft glow -->
                        <radialgradient id="botanicalGlow">
                            <stop offset="0%" stop-color="#C8E6C9" stop-opacity="0.5" />
                            <stop offset="100%" stop-color="#81C784" stop-opacity="0" />
                        </radialgradient>

                        <!-- Textured blur for realism -->
                        <filter id="softBlur" x="-10%" y="-10%" width="120%" height="120%">
                            <fegaussianblur in="SourceGraphic" stddeviation="0.6" />
                        </filter>
                    </defs>

                    <!-- Background -->
                    <rect width="1200" height="500" fill="#F9FFF9" />

                    <!-- Central plant -->
                    <g transform="translate(600, 480)">
                        <!-- Main stem -->
                        <path d="M 0 0 Q -8 -100, 0 -200 Q 10 -300, 0 -400" stroke="url(#stemGradient)" stroke-width="4" fill="none" filter="url(#softBlur)" />

                        <!-- Branches -->
                        <path d="M 0 -100 Q -40 -120, -80 -130" stroke="url(#stemGradient)" stroke-width="2" fill="none" />
                        <path d="M 0 -180 Q 50 -200, 100 -190" stroke="url(#stemGradient)" stroke-width="2" fill="none" />
                        <path d="M 0 -250 Q -45 -270, -90 -260" stroke="url(#stemGradient)" stroke-width="1.8" fill="none" />
                        <path d="M 0 -320 Q 40 -340, 80 -335" stroke="url(#stemGradient)" stroke-width="1.8" fill="none" />
                    </g>

                    <!-- Naturalistic Leaves (Bezier shapes instead of ellipses) -->
                    <g filter="url(#softBlur)">
                        <!-- Left side leaves -->
                        <path d="M520 370 C490 350,470 310,510 290 C540 280,560 320,520 370 Z" fill="url(#leafGradient)" stroke="url(#veinGradient)" stroke-width="1" />
                        <path d="M500 270 C470 250,450 220,495 200 C530 195,550 230,500 270 Z" fill="url(#leafGradient)" stroke="url(#veinGradient)" stroke-width="1" />
                        <path d="M520 180 C495 160,470 140,510 120 C540 115,555 155,520 180 Z" fill="url(#leafGradient)" stroke="url(#veinGradient)" stroke-width="1" />

                        <!-- Right side leaves -->
                        <path d="M680 360 C710 340,730 310,690 280 C660 270,650 320,680 360 Z" fill="url(#leafGradient)" stroke="url(#veinGradient)" stroke-width="1" />
                        <path d="M700 270 C730 250,760 230,710 210 C675 210,670 250,700 270 Z" fill="url(#leafGradient)" stroke="url(#veinGradient)" stroke-width="1" />
                        <path d="M670 180 C695 160,720 140,680 120 C650 120,635 155,670 180 Z" fill="url(#leafGradient)" stroke="url(#veinGradient)" stroke-width="1" />
                    </g>

                    <!-- Leaf veins (fine lines) -->
                    <g stroke="#33691E" stroke-width="0.5" opacity="0.3">
                        <path d="M520 370 Q510 340,520 310" />
                        <path d="M680 360 Q690 330,680 300" />
                        <path d="M500 270 Q490 240,500 210" />
                        <path d="M700 270 Q710 240,700 210" />
                    </g>

                    <!-- Flower at top -->
                    <g transform="translate(600, 100)">
                        <circle cx="0" cy="0" r="22" fill="url(#botanicalGlow)" />
                        <g opacity="0.8">
                            <path d="M0 -20 C10 -40,30 -40,20 -10 Z" fill="#FFCC80" />
                            <path d="M0 -20 C-10 -40,-30 -40,-20 -10 Z" fill="#FFB74D" />
                            <path d="M0 -20 C-5 -10,5 -10,0 -20 Z" fill="#FFA726" />
                        </g>
                        <circle cx="0" cy="-10" r="5" fill="#F57C00" />
                    </g>

                    <!-- Small dandelion left -->
                    <g transform="translate(250, 360)">
                        <path d="M0 0 Q 0 -40, -5 -90" stroke="#7CB342" stroke-width="2" fill="none" />
                        <circle cx="-5" cy="-90" r="28" stroke="#9CCC65" stroke-width="1" fill="none" opacity="0.7" />
                        <g stroke="#AED581" stroke-width="0.6" opacity="0.7">
                            <line x1="-5" y1="-90" x2="-5" y2="-120" />
                            <line x1="-5" y1="-90" x2="20" y2="-110" />
                            <line x1="-5" y1="-90" x2="-25" y2="-110" />
                        </g>
                        <circle cx="-5" cy="-120" r="2" fill="#AED581" />
                    </g>

                    <!-- Small sprout right -->
                    <g transform="translate(950, 410)">
                        <path d="M 0 0 Q -3 -25, 0 -55" stroke="#558B2F" stroke-width="2" fill="none" />
                        <path d="M -5 -40 C -25 -50,-30 -30,-5 -25 Z" fill="url(#leafGradient)" />
                        <path d="M 5 -45 C 25 -55,30 -35,5 -30 Z" fill="url(#leafGradient)" />
                    </g>

                    <!-- Grass -->
                    <g opacity="0.6" stroke-width="1.5" fill="none">
                        <path d="M 80 500 Q 75 460, 85 420" stroke="#8BC34A" />
                        <path d="M 160 500 Q 155 455, 165 410" stroke="#9CCC65" />
                        <path d="M 960 500 Q 955 460, 960 420" stroke="#8BC34A" />
                        <path d="M 1040 500 Q 1035 455, 1045 410" stroke="#7CB342" />
                    </g>

                    <!-- Ambient glow animation -->
                    <circle cx="600" cy="300" r="160" fill="url(#botanicalGlow)" opacity="0.4">
                        <animate attributename="r" values="160;180;160" dur="6s" repeatcount="indefinite" />
                    </circle>

                    <!-- Ground -->
                    <line x1="0" y1="500" x2="1200" y2="500" stroke="#A5D6A7" stroke-width="2" opacity="0.5" />
                </svg>
