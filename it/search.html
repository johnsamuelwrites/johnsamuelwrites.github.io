<!DOCTYPE html>
<html lang="it">

    <head>
        <meta name="generator" content="Q315 renderer" />
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="shortcut icon" href="../images/logo/favicon.png" />
        <title>Ricerca - John Samuel</title>
        <link rel="stylesheet" href="../Q315/assets/css/pages/Q3647.css" data-q315-css="Q3647" />
    </head>

    <body>
        <!-- Navigation -->
        <nav class="navigation" role="navigation">
            <div class="nav-container">
                <a href="./index.html" class="nav-brand">John Samuel</a>
                <ul class="nav-menu">
                    <li><a href="./index.html">Italiano</a></li>
                </ul>
            </div>
        </nav>

        <!-- Main Content -->
        <main>
            <div class="search-header">
                <h1>Ricerca</h1>
                <p>Cerca in tutti i contenuti di questo sito web</p>
            </div>

            <div class="search-container">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" class="search-input"
                        placeholder="Cerca argomenti, articoli, foto o corsi..." autocomplete="off" autofocus>
                </div>
                <div class="search-filters">
                    <button class="filter-btn active" data-category="all">Tutto</button>
                    <button class="filter-btn" data-category="research">Ricerca</button>
                    <button class="filter-btn" data-category="teaching">Insegnamento</button>
                    <button class="filter-btn" data-category="writings">Scritti</button>
                    <button class="filter-btn" data-category="linguistics">Linguistica</button>
                    <button class="filter-btn" data-category="photography">Fotografia</button>
                    <button class="filter-btn" data-category="travel">Viaggi</button>
                    <button class="filter-btn" data-category="blog">Blog</button>
                </div>
            </div>

            <div id="searchStats" class="search-stats"></div>
            <div id="resultsContainer" class="results-container"></div>
</main>

        <script>
            // Simple client-side search implementation
            let searchData = [];
            let currentCategory = 'all';

            // Initialize search
            async function initSearch() {
                try {
                    const response = await fetch('./search-index.json');
                    if (response.ok) {
                        searchData = await response.json();
                    } else {
                        console.log('Search index not found.');
                        searchData = [];
                    }
                } catch (error) {
                    console.error('Error loading search index:', error);
                    searchData = [];
                }
            }

            // Search function
            function performSearch(query) {
                if (!query || query.length < 2) {
                    displayResults([]);
                    return;
                }

                const searchTerms = query.toLowerCase().split(/\s+/);

                const results = searchData.filter(item => {
                    if (currentCategory !== 'all' && item.category !== currentCategory) {
                        return false;
                    }

                    const searchText = `${item.title} ${item.content || ''} ${item.url}`.toLowerCase();
                    return searchTerms.every(term => searchText.includes(term));
                });

                results.sort((a, b) => {
                    const aTitle = a.title.toLowerCase();
                    const bTitle = b.title.toLowerCase();
                    const aScore = searchTerms.reduce((score, term) =>
                        score + (aTitle.includes(term) ? 10 : 1), 0);
                    const bScore = searchTerms.reduce((score, term) =>
                        score + (bTitle.includes(term) ? 10 : 1), 0);
                    return bScore - aScore;
                });

                displayResults(results, query);
            }

            // Display results
            function displayResults(results, query = '') {
                const container = document.getElementById('resultsContainer');
                const stats = document.getElementById('searchStats');

                if (!query) {
                    container.innerHTML = '';
                    stats.innerHTML = '';
                    return;
                }

                if (results.length === 0) {
                    stats.innerHTML = '';
                    container.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-icon">🔍</div>
                        <h2>Nessun risultato trovato</h2>
                        <p>Prova parole chiave diverse o rimuovi i filtri</p>
                    </div>
                `;
                    return;
                }

                stats.innerHTML = `Trovati ${results.length} risultato/i per "${query}"`;

                container.innerHTML = results.map(result => {
                    const excerpt = getExcerpt(result.content || result.title, query);
                    const categoryLabel = result.category || 'general';

                    return `
                    <div class="result-card">
                        <span class="result-category">${categoryLabel}</span>
                        <h2 class="result-title">
                            <a href="${result.url}">${highlightText(result.title, query)}</a>
                        </h2>
                        <p class="result-excerpt">${excerpt}</p>
                        <a href="${result.url}" class="result-url">${result.url} →</a>
                    </div>
                `;
                }).join('');
            }

            // Highlight search terms
            function highlightText(text, query) {
                if (!query) return text;
                const terms = query.split(/\s+/);
                let highlighted = text;
                terms.forEach(term => {
                    const regex = new RegExp(`(${escapeRegex(term)})`, 'gi');
                    highlighted = highlighted.replace(regex, '<mark>$1</mark>');
                });
                return highlighted;
            }

            // Get excerpt with context
            function getExcerpt(text, query, length = 200) {
                if (!text) return '';

                const terms = query.toLowerCase().split(/\s+/);
                const textLower = text.toLowerCase();

                let position = -1;
                for (const term of terms) {
                    const pos = textLower.indexOf(term);
                    if (pos !== -1 && (position === -1 || pos < position)) {
                        position = pos;
                    }
                }

                if (position === -1) {
                    return highlightText(text.substring(0, length), query) + (text.length > length ? '...' : '');
                }

                const start = Math.max(0, position - 50);
                const end = Math.min(text.length, position + length);
                let excerpt = text.substring(start, end);

                if (start > 0) excerpt = '...' + excerpt;
                if (end < text.length) excerpt = excerpt + '...';

                return highlightText(excerpt, query);
            }

            // Escape regex special characters
            function escapeRegex(string) {
                return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            }

            // Event listeners
            document.getElementById('searchInput').addEventListener('input', (e) => {
                performSearch(e.target.value);
            });

            // Category filters
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function () {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentCategory = this.dataset.category;
                    performSearch(document.getElementById('searchInput').value);
                });
            });

            // Initialize on load and handle URL parameters
            async function init() {
                await initSearch();

                // Check for query parameter in URL
                const urlParams = new URLSearchParams(window.location.search);
                const query = urlParams.get('q');

                if (query) {
                    document.getElementById('searchInput').value = query;
                    performSearch(query);
                }
            }

            init();
        </script>
    </body>

</html>
