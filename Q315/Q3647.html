        <script>
            let searchData = [];
            let currentCategory = 'all';

            // Initialize search
            async function initSearch() {
                try {
                    const response = await fetch('./search-index.json');
                    if (response.ok) {
                        searchData = await response.json();
                    } else {
                        searchData = await generateBasicIndex();
                    }
                } catch (error) {
                    console.error('Error loading search index:', error);
                    searchData = [];
                }
            }

            async function generateBasicIndex() {
                const pages = [
                    { qid: 'Q315', url: './index.html', title: 'Q315', category: 'general' },
                    { qid: 'Q3633', url: './Q3633.html', title: 'Q3633', category: 'general' },
                    { qid: 'Q3634', url: './Q3634.html', title: 'Q3634', category: 'writings' },
                    { qid: 'Q3636', url: './Q3636/index.html', title: 'Q3636', category: 'research' },
                    { qid: 'Q3638', url: './Q3638/index.html', title: 'Q3638', category: 'writings' },
                    { qid: 'Q7945', url: './Q7945/index.html', title: 'Q7945', category: 'teaching' },
                    { qid: 'Q7947', url: './Q7947/index.html', title: 'Q7947', category: 'linguistics' },
                    { qid: 'Q3062', url: './Q3062/index.html', title: 'Q3062', category: 'travel' },
                ];
                return pages;
            }

            // Search function
            function performSearch(query) {
                if (!query || query.length < 2) {
                    displayResults([]);
                    return;
                }

                const searchTerms = query.toLowerCase().split(/\s+/);

                const results = searchData.filter(item => {
                    // Filter by category
                    if (currentCategory !== 'all' && item.category !== currentCategory) {
                        return false;
                    }

                    // Search in title and content
                    const searchText = `${item.qid || ''} ${item.title} ${item.content || ''} ${item.url}`.toLowerCase();
                    return searchTerms.every(term => searchText.includes(term));
                });

                // Sort by relevance (title matches first)
                results.sort((a, b) => {
                    return relevanceScore(b, searchTerms) - relevanceScore(a, searchTerms);
                });

                displayResults(results, query);
            }

            function relevanceScore(item, searchTerms) {
                const qid = (item.qid || '').toLowerCase();
                const title = item.title.toLowerCase();
                const url = item.url.toLowerCase();
                return searchTerms.reduce((score, term) => {
                    if (qid === term) return score + 100;
                    if (qid.includes(term)) return score + 50;
                    if (title.includes(term)) return score + 20;
                    if (url.includes(term)) return score + 10;
                    return score + 1;
                }, 0);
            }

            // Display results
            function displayResults(results, query = '') {
                const container = document.getElementById('resultsContainer');
                const stats = document.getElementById('searchStats');

                if (!query) {
                    container.innerHTML = '';
                    stats.innerHTML = '';
                    return;
                }

                if (results.length === 0) {
                    stats.innerHTML = '';
                    container.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-icon">🔍</div>
                        <h2>Q3833</h2>
                        <p>Try different keywords or remove filters</p>
                    </div>
                `;
                    return;
                }

                stats.textContent = `Found ${results.length} result${results.length !== 1 ? 's' : ''} for "${query}"`;

                container.innerHTML = results.map(result => {
                    const excerpt = getExcerpt(result.content || result.title, query);
                    const categoryLabel = result.category || 'general';
                    const qid = result.qid ? `<span class="result-qid">${escapeHtml(result.qid)}</span>` : '';

                    return `
                    <div class="result-card">
                        <span class="result-category">${escapeHtml(categoryLabel)}</span>
                        ${qid}
                        <h2 class="result-title">
                            <a href="${escapeHtml(result.url)}">${highlightText(result.title, query)}</a>
                        </h2>
                        <p class="result-excerpt">${excerpt}</p>
                        <a href="${escapeHtml(result.url)}" class="result-url">${escapeHtml(result.url)} →</a>
                    </div>
                `;
                }).join('');
            }

            // Highlight search terms
            function highlightText(text, query) {
                if (!query) return escapeHtml(text);
                const terms = query.split(/\s+/);
                let highlighted = escapeHtml(text);
                terms.forEach(term => {
                    const regex = new RegExp(`(${escapeRegex(term)})`, 'gi');
                    highlighted = highlighted.replace(regex, '<mark>$1</mark>');
                });
                return highlighted;
            }

            // Get excerpt with context
            function getExcerpt(text, query, length = 200) {
                if (!text) return '';

                const terms = query.toLowerCase().split(/\s+/);
                const textLower = text.toLowerCase();

                // Find first occurrence of any search term
                let position = -1;
                for (const term of terms) {
                    const pos = textLower.indexOf(term);
                    if (pos !== -1 && (position === -1 || pos < position)) {
                        position = pos;
                    }
                }

                if (position === -1) {
                    // No match found, return beginning
                    return highlightText(text.substring(0, length), query) + (text.length > length ? '...' : '');
                }

                // Get context around the match
                const start = Math.max(0, position - 50);
                const end = Math.min(text.length, position + length);
                let excerpt = text.substring(start, end);

                if (start > 0) excerpt = '...' + excerpt;
                if (end < text.length) excerpt = excerpt + '...';

                return highlightText(excerpt, query);
            }

            // Escape regex special characters
            function escapeRegex(string) {
                return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            }

            function escapeHtml(string) {
                return String(string).replace(/[&<>"']/g, character => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#39;'
                }[character]));
            }

            // Event listeners
            document.getElementById('searchInput').addEventListener('input', (e) => {
                performSearch(e.target.value);
            });

            // Category filters
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function () {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentCategory = this.dataset.category;
                    performSearch(document.getElementById('searchInput').value);
                });
            });

            // Initialize on load and handle URL parameters
            async function init() {
                await initSearch();

                // Check for query parameter in URL
                const urlParams = new URLSearchParams(window.location.search);
                const query = urlParams.get('q');

                if (query) {
                    document.getElementById('searchInput').value = query;
                    performSearch(query);
                }
            }

            init();
        </script>
