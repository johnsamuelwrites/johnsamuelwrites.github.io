            <!-- Hero Section -->
            <section class="hero-section">
                <h2 class="hero-title">FRACTALS</h2>
                <p class="hero-subtitle">Self-Similar • Recursive • Infinite</p>

                <!-- Fractal SVG -->
                <svg class="fractal-svg" viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg">
                    <!-- Definitions -->
                    <defs>
                        <linearGradient id="fractalGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#8A2BE2;stop-opacity:0.8" />
                            <stop offset="50%" style="stop-color:#9370DB;stop-opacity:0.6" />
                            <stop offset="100%" style="stop-color:#DAA520;stop-opacity:0.8" />
                        </linearGradient>
                        <radialGradient id="fractalGlow">
                            <stop offset="0%" style="stop-color:#8A2BE2;stop-opacity:0.5" />
                            <stop offset="50%" style="stop-color:#9370DB;stop-opacity:0.3" />
                            <stop offset="100%" style="stop-color:#DAA520;stop-opacity:0" />
                        </radialGradient>
                        <filter id="fractalBlur">
                            <feGaussianBlur in="SourceGraphic" stdDeviation="2" />
                        </filter>
                    </defs>

                    <!-- Background -->
                    <rect x="0" y="0" width="1200" height="500" fill="#0A0E27" />

                    <!-- Central branching tree structure -->
                    <g transform="translate(600, 450)">
                        <!-- Main trunk -->
                        <path class="fractal-branch" d="M 0 0 L 0 -120" stroke-width="6" />

                        <!-- First level branches -->
                        <path class="fractal-branch" d="M 0 -120 L -70 -200 M 0 -120 L 70 -200" stroke-width="4" />

                        <!-- Second level branches (left) -->
                        <path class="fractal-branch" d="M -70 -200 L -110 -260 M -70 -200 L -30 -260"
                            stroke-width="2.5" />

                        <!-- Second level branches (right) -->
                        <path class="fractal-branch" d="M 70 -200 L 30 -260 M 70 -200 L 110 -260" stroke-width="2.5" />

                        <!-- Third level branches (far left) -->
                        <path class="fractal-branch" d="M -110 -260 L -135 -300 M -110 -260 L -85 -300"
                            stroke-width="1.5" />

                        <!-- Third level branches (center left) -->
                        <path class="fractal-branch" d="M -30 -260 L -50 -300 M -30 -260 L -10 -300"
                            stroke-width="1.5" />

                        <!-- Third level branches (center right) -->
                        <path class="fractal-branch" d="M 30 -260 L 10 -300 M 30 -260 L 50 -300" stroke-width="1.5" />

                        <!-- Third level branches (far right) -->
                        <path class="fractal-branch" d="M 110 -260 L 85 -300 M 110 -260 L 135 -300"
                            stroke-width="1.5" />
                    </g>

                    <!-- Recursive circles at branch points -->
                    <g>
                        <circle class="fractal-circle" cx="600" cy="330" r="35" />
                        <circle class="fractal-circle" cx="530" cy="250" r="28" />
                        <circle class="fractal-circle" cx="670" cy="250" r="28" />
                        <circle class="fractal-circle" cx="490" cy="190" r="22" />
                        <circle class="fractal-circle" cx="570" cy="190" r="22" />
                        <circle class="fractal-circle" cx="630" cy="190" r="22" />
                        <circle class="fractal-circle" cx="710" cy="190" r="22" />
                    </g>

                    <!-- Recursive node connections -->
                    <g opacity="0.4">
                        <line x1="600" y1="330" x2="530" y2="250" stroke="#8A2BE2" stroke-width="1.5" />
                        <line x1="600" y1="330" x2="670" y2="250" stroke="#8A2BE2" stroke-width="1.5" />
                        <line x1="530" y1="250" x2="490" y2="190" stroke="#9370DB" stroke-width="1.2" />
                        <line x1="530" y1="250" x2="570" y2="190" stroke="#9370DB" stroke-width="1.2" />
                        <line x1="670" y1="250" x2="630" y2="190" stroke="#9370DB" stroke-width="1.2" />
                        <line x1="670" y1="250" x2="710" y2="190" stroke="#9370DB" stroke-width="1.2" />
                    </g>

                    <!-- Mandelbrot-inspired pattern on right -->
                    <g transform="translate(900, 250)">
                        <circle class="fractal-circle" cx="0" cy="0" r="60" opacity="0.5" />
                        <circle class="fractal-circle" cx="-35" cy="0" r="40" opacity="0.4" />
                        <circle class="fractal-circle" cx="-60" cy="0" r="25" opacity="0.3" />
                        <circle class="fractal-circle" cx="-75" cy="0" r="15" opacity="0.2" />
                        <circle class="fractal-circle" cx="25" cy="30" r="30" opacity="0.35" />
                        <circle class="fractal-circle" cx="25" cy="-30" r="30" opacity="0.35" />
                    </g>

                    <!-- Koch snowflake fragment on left -->
                    <g transform="translate(150, 120)">
                        <path class="fractal-branch" d="M 0 0 L 80 0 L 40 -70 Z" fill="none" stroke-width="2" />
                        <path class="fractal-branch" d="M 20 -12 L 40 -12 L 30 -28 Z M 40 -35 L 60 -35 L 50 -51 Z"
                            fill="none" stroke-width="1.5" />
                    </g>

                    <!-- Recursive nodes with pulse -->
                    <g>
                        <circle class="recursive-node" cx="600" cy="330" r="6" />
                        <circle class="recursive-node" cx="530" cy="250" r="5" />
                        <circle class="recursive-node" cx="670" cy="250" r="5" />
                        <circle class="recursive-node" cx="490" cy="190" r="4" />
                        <circle class="recursive-node" cx="570" cy="190" r="4" />
                        <circle class="recursive-node" cx="630" cy="190" r="4" />
                        <circle class="recursive-node" cx="710" cy="190" r="4" />
                    </g>

                    <!-- Vertical iteration lines -->
                    <g opacity="0.12">
                        <line x1="300" y1="50" x2="300" y2="450" stroke="#8A2BE2" stroke-width="1.5" />
                        <line x1="450" y1="50" x2="450" y2="450" stroke="#9370DB" stroke-width="1.5" />
                        <line x1="750" y1="50" x2="750" y2="450" stroke="#9370DB" stroke-width="1.5" />
                        <line x1="900" y1="50" x2="900" y2="450" stroke="#DAA520" stroke-width="1.5" />
                    </g>

                    <!-- Connecting arcs showing self-similarity -->
                    <g opacity="0.3">
                        <path class="fractal-branch" d="M 530 250 Q 600 220, 670 250" fill="none" />
                        <path class="fractal-branch" d="M 490 190 Q 530 170, 570 190" fill="none" />
                        <path class="fractal-branch" d="M 630 190 Q 670 170, 710 190" fill="none" />
                    </g>

                    <!-- Radiating glow from center -->
                    <circle cx="600" cy="330" r="120" fill="url(#fractalGlow)" opacity="0.4">
                        <animate attributeName="r" values="120;150;120" dur="4s" repeatCount="indefinite" />
                        <animate attributeName="opacity" values="0.4;0.6;0.4" dur="4s" repeatCount="indefinite" />
                    </circle>

                    <!-- Julia set inspired decorative elements -->
                    <g transform="translate(100, 350)" opacity="0.5">
                        <circle class="fractal-circle" cx="0" cy="0" r="20" />
                        <circle class="fractal-circle" cx="15" cy="15" r="12" />
                        <circle class="fractal-circle" cx="-15" cy="15" r="12" />
                        <circle class="fractal-circle" cx="20" cy="-10" r="8" />
                        <circle class="fractal-circle" cx="-20" cy="-10" r="8" />
                    </g>

                    <!-- Sierpiński-inspired triangular subdivisions -->
                    <g transform="translate(1000, 100)" opacity="0.35">
                        <path class="fractal-branch" d="M 0 0 L 100 0 L 50 -87 Z M 25 -43.5 L 75 -43.5 L 50 -87 Z"
                            fill="none" stroke-width="1.5" />
                    </g>
                </svg>

                        <article class="fractal-card">
