name: CI

on:
  push:
  pull_request:

jobs:
  test-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r src/main/requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s src/test -p "test_*.py"

      - name: Check internal broken links in changed HTML files
        env:
          GITHUB_DIFF_RANGE: ${{ github.event_name == 'pull_request' && format('{0}...{1}', github.event.pull_request.base.sha, github.sha) || format('{0}...{1}', github.event.before, github.sha) }}
        run: python src/main/ci_internal_links.py

      - name: Check internal broken links across the whole site
        run: python src/main/ci_internal_links.py --all

      - name: Check Q315 links
        run: python src/main/ci_internal_links.py --root Q315

      - name: Check canonical abstract CSS references
        run: python src/main/abstract/css_assets.py check

      - name: Check every canonical Q315 document
        run: python src/main/abstract/validate_abstract_html.py Q315

      - name: Check rendered Q315 labels are current
        run: python src/main/abstract/render_page.py --check

      - name: Check Q315 structural repairs are current
        run: python src/main/abstract/repair_structure.py --check

      - name: Check Q315 round-trip has no regressions
        # Ratchet: only ever lower this budget as page-language pairs are made
        # reproducible from their abstract bindings. It reaches 0 when every
        # rendered page round-trips. Lowered 214 -> 70 after Q3640 (books) was
        # aligned across all 8 languages; -> 68 after the es Teaching
        # ("Enseñanza") pages were reconciled; -> 60 after Q3646 (detailed CV)
        # labels were aligned to the published page text across all 8 languages;
        # -> 59 after the pt travel-index research breadcrumb ("Pesquisa") was
        # reconciled with its siblings; -> 0 after structurally divergent legacy
        # slots were unbound from Q315 ownership pending full page migration.
        run: |
          python src/main/abstract/verify_content_roundtrip.py \
            --max-mismatches 0 \
            --report "${RUNNER_TEMP}/q315-content-roundtrip.json"

      - name: Check every Q315 page has one language-switcher footer
        # Every page rendered from Q315 must carry exactly one styled language
        # switcher (the travel "langlist" grid or the section "lang-selector"
        # buttons) linking all its languages including itself, current one
        # highlighted, with no duplicate or bare language-switcher nav. The budget
        # is a ratchet: only ever lower it as the remaining section pages are
        # fixed; it reaches 0 when every Q315 page conforms.
        run: |
          python src/main/abstract/verify_language_footer.py \
            --max-failing-pages 0
