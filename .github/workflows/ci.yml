name: CI

on:
  push:
  pull_request:

jobs:
  test-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r src/main/requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s src/test -p "test_*.py"

      - name: Check internal broken links in changed HTML files
        env:
          GITHUB_DIFF_RANGE: ${{ github.event_name == 'pull_request' && format('{0}...{1}', github.event.pull_request.base.sha, github.sha) || format('{0}...{1}', github.event.before, github.sha) }}
        run: python src/main/ci_internal_links.py

      - name: Check internal broken links across the whole site
        run: python src/main/ci_internal_links.py --all

      - name: Check generated abstract pages
        run: python src/main/ci_internal_links.py --root Q315

      - name: Check canonical abstract CSS references
        run: python src/main/abstract/css_assets.py check

      - name: Check abstract HTML contract pilot
        run: python src/main/abstract/validate_abstract_html.py Q315/Q3062/index.html

      - name: Check Q3062 Wikibase rendering is current
        run: python src/main/abstract/render_q3062_hero.py --check

      - name: Check travel content QuickStatements are complete
        run: python src/main/abstract/prepare_travel_content.py --check

      - name: Check Q315 travel content bindings are current
        run: python src/main/abstract/bind_travel_manifest.py --check
